services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger_pg:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://ledger:ledger@db:5432/ledger
      JWT_SECRET: local-dev-secret-change-me
      OPERATOR_USERNAME: operator
      OPERATOR_PASSWORD: change-me
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ledger_pg:
